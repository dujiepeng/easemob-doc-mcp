# 环信文档搜索服务 Docker Compose 配置
services:
  # 主服务：环信文档搜索 API
  easemob-doc-search:
    # 构建配置
    build: 
      context: .
      dockerfile: Dockerfile
    
    # 端口映射：主机端口 -> 容器端口
    ports:
      - "8000:8000"
    
    # 环境变量
    environment:
      - NODE_ENV=production
      - PORT=8000
      - TZ=Asia/Shanghai
    
    # 数据卷挂载：文档目录（只读）
    volumes:
      - ./document:/app/document:ro
    
    # 重启策略：除非手动停止，否则总是重启
    restart: unless-stopped
    
    # 健康检查配置
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s      # 检查间隔
      timeout: 10s       # 超时时间
      retries: 3         # 重试次数
      start_period: 40s  # 启动宽限期
    
    # 资源限制（可选）
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M 